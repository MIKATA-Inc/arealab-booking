<!DOCTYPE html>

  <style>
    html, body { overflow-y: auto; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      max-width: 960px;

    .note {
      background: #fff8dc;

      padding: 12px 14px;

      color: #555;
      margin: 0 0 24px;
      border-radius: 4px;
    }
    #timerex_calendar {
      width: 100%;

    }
    #timerex_calendar iframe {

<body>

  <script>
    const TIMEREX_BASE = 'https://timerex.net/s/mikata1021/1fdbe7fb';

    const queryString = window.location.search.replace(/^\?/, '');
    const dataUrl = queryString
      ? TIMEREX_BASE + '?' + queryString
      : TIMEREX_BASE;
    document.getElementById('timerex_calendar').setAttribute('data-url', dataUrl);
